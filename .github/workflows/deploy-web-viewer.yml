name: Deploy Web Viewer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'recallos_web_viewer/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: recallos_web_viewer
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: recallos_web_viewer
        run: |
          flutter build web --release --base-href / \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=WEB_ORIGIN=https://recallos-web-viewer.vercel.app

      - name: Prepare Vercel output
        working-directory: recallos_web_viewer
        run: |
          mkdir -p .vercel/output/static
          cp -r build/web/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "/.well-known/assetlinks.json",
                "headers": { "Content-Type": "application/json" },
                "continue": true
              },
              {
                "src": "/.well-known/apple-app-site-association",
                "headers": { "Content-Type": "application/json" },
                "continue": true
              },
              { "src": "/stack/(.*)", "dest": "/index.html" },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy to Vercel
        working-directory: recallos_web_viewer
        run: npx vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }} --scope sushobhans-projects-7ccc9565 --yes --prod
